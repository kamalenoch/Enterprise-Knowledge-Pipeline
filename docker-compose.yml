services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-knowledge-postgres
    environment:
      POSTGRES_USER: enterprise_admin
      POSTGRES_PASSWORD: super_secure_password_2026
      POSTGRES_DB: knowledge_pipeline
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_admin -d knowledge_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis/redis-stack-server:latest
    container_name: enterprise-knowledge-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  redisdata:
